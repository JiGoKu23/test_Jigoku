l_japanese:
 tj_FIS.1.t: "政権交代"
 tj_FIS.1.d: "現在仮想国家において総選挙が実施された。さて、政権を担うのは誰なのか。"
 tj_FIS.1.a: "指導者３だ"
 tj_FIS.1.a.tt: "ファシズムになり指導者３が国家元首となる"
 tj_FIS.1.b: "指導者２だ"
 tj_FIS.1.b.tt: "共産主義になり指導者２が国家元首となる"
 tj_FIS.1.c: "指導者４だ"
 tj_FIS.1.c.tt: "アナーキストの指導者４が国家元首となる"
 tj_FIS.1.e: "現状維持だ"
 tj_FIS.2.t: "架空国家がパラオに出現"
 tj_FIS.2.d: "架空国家が突如パラオに出現した模様だ。各国は現在情報収集に走っている、"
 tj_FIS.2.a: "なんと！"